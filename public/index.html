<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>🌏 災異前哨系統</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 400px; margin-bottom: 20px; }
    .user-location-marker { z-index: 1000; }
  </style>
</head>
<body>
  <h1>🌏 災異前哨系統</h1>

  <section>
    <h2>🌤️ 氣象資料</h2>
    <div id="weather">載入中...</div>
  </section>

  <section>
    <h2>💧 水位資料</h2>
    <div id="water">載入中...</div>
  </section>

  <section>
    <h2>🌋 地震資料</h2>
    <div id="earthquake">載入中...</div>
  </section>

  <section>
    <h2>🗺️ 災害地圖</h2>
    <div id="map"></div>
    <button id="locationBtn">📍 定位我</button>
  </section>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    let map;
    let markers = [];
    let userMarker = null;

    const systemData = { 
      waterStations: [], 
      disasterPoints: [], 
      userLocation: null 
    };

    // 初始化地圖
    function initMap() {
      map = L.map('map').setView([25.0330, 121.5654], 8); // 台北
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);
    }

    // 取得災害資料並更新地圖標記
    async function loadDisasters() {
      try {
        const res = await fetch("/api/water");
        const data = await res.json();
        systemData.waterStations = data;

        // 清除舊標記
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.forEach(item => {
          const color = item.level > item.alert ? '#ef4444' : '#10b981';
          const marker = L.circleMarker([item.lat || 25.0, item.lng || 121.5], {
            radius: 8,
            fillColor: color,
            color: '#fff',
            weight: 2,
            fillOpacity: 0.8
          }).addTo(map);

          marker.bindPopup(`
            <div>
              河流：${item.river} <br>
              水位：${item.waterLevel} m<br>
            </div>
          `);
          markers.push(marker);
        });

      } catch {
        console.log("無法取得水位資料");
      }
    }

    // 更新氣象
    async function loadWeather() {
      try {
        const res = await fetch("/api/weather");
        const data = await res.json();
        document.getElementById("weather").innerHTML = `
          地點：${data.locationName}<br>
          天氣：${data.weather}<br>
          溫度：${data.minT}°C - ${data.maxT}°C
        `;
      } catch {
        document.getElementById("weather").innerHTML = "⚠️ 無法取得氣象資料";
      }
    }

    // 更新水位
   async function loadwater() {
      try {
        const res = await fetch("/api/water");
        const data = await res.json();
        document.getElementById("weather").innerHTML = `
          地點：淡水河<br>
          水位：${data.waterlevel}m
        `;
      } catch {
        document.getElementById("weather").innerHTML = "⚠️ 無法取得水位資料";
      }
    }


    
    // 更新地震
    async function loadEarthquake() {
      try {
        const res = await fetch("/api/earthquake");
        const data = await res.json();
        document.getElementById("earthquake").innerHTML = `
          發生時間：${data.time}<br>
          位置：${data.location}<br>
          規模：${data.magnitude}
        `;
      } catch {
        document.getElementById("earthquake").innerHTML = "⚠️ 無法取得地震資料";
      }
    }

    // 取得使用者位置
    function getUserLocation() {
      const btn = document.getElementById('locationBtn');
      btn.textContent = '📍 定位中...';
      btn.disabled = true;

      if (!navigator.geolocation) {
        alert("瀏覽器不支援定位功能");
        btn.textContent = '📍 定位我';
        btn.disabled = false;
        return;
      }

      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        systemData.userLocation = { lat, lng };

        if (userMarker) map.removeLayer(userMarker);

        userMarker = L.marker([lat, lng], {
          icon: L.divIcon({
            className: 'user-location-marker',
            html: '<div style="background: #3b82f6; width: 12px; height: 12px; border-radius: 50%; border: 3px solid white;"></div>',
            iconSize: [18, 18],
            iconAnchor: [9, 9]
          })
        }).addTo(map);

        userMarker.bindPopup('📍 您的位置').openPopup();
        map.setView([lat, lng], 10);
        btn.textContent = '📍 重新定位';
        btn.disabled = false;
      }, () => {
        alert("無法取得位置");
        btn.textContent = '📍 定位我';
        btn.disabled = false;
      });
    }

    // 同步更新所有資料
    async function loadAll() {
      await Promise.all([loadWeather(), loadEarthquake(), loadDisasters()]);
    }

    // 初始化
    initMap();
    loadAll();
    setInterval(loadAll, 60*1000); // 每60秒更新
    document.getElementById('locationBtn').addEventListener('click', getUserLocation);

  </script>
  <!-- 全螢幕 EEW 警報 -->
<div id="eewAlertFull" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-color:red;
  color:white;
  font-size:2em;
  text-align:center;
  z-index:9999;
  flex-direction:column;
  justify-content:center;
  align-items:center;
">
  <h1>⚠️ 地震警報</h1>
  <p id="eewInfoFull"></p>
  <p>預估 <span id="eewCountdownFull"></span> 秒後強烈搖晃</p>
  <button id="closeEEW" style="
    margin-top:20px;
    padding:10px 20px;
    font-size:1.2em;
    background:white;
    color:red;
    border:none;
    cursor:pointer;
  ">關閉</button>
</div>

<!-- 模擬測試按鈕 -->
<button id="testBtn" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 20px; font-size:1.2em;">模擬地震警報</button>

<script>
  const ws = new WebSocket('ws://localhost:3001')
  let timerFull = null

  function showEEWFull(data) {
    const alertDiv = document.getElementById('eewAlertFull')
    alertDiv.style.display = 'flex' // flex 讓內容置中

    document.getElementById('eewInfoFull').innerText = `規模 ${data.magnitude}，距離 ${data.distance || '?'} km`

    let t = data.sWaveArriveIn
    document.getElementById('eewCountdownFull').innerText = t

    clearInterval(timerFull)
    timerFull = setInterval(() => {
      t--
      document.getElementById('eewCountdownFull').innerText = t
      if (t <= 0) clearInterval(timerFull)
    }, 1000)
  }

  // WebSocket 收到 EEW
  ws.onmessage = e => {
    const data = JSON.parse(e.data)
    if (data.type === 'EEW') showEEWFull(data)
  }

  // 模擬按鈕
  document.getElementById('testBtn').addEventListener('click', () => {
    const testData = {
      type: 'EEW',
      magnitude: 6.5,
      distance: 50,
      sWaveArriveIn: 15,
      originTime: new Date().toISOString()
    }
    showEEWFull(testData)
  })

  // 關閉按鈕
  document.getElementById('closeEEW').addEventListener('click', () => {
    document.getElementById('eewAlertFull').style.display = 'none'
    clearInterval(timerFull)
  })
</script>


</body>
</html>
